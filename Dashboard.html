<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceLog Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fef8f1;
  --surface:#FFFFFF;
  --surface-2:#f5dfc0;
  --border:#E8E2DC;
  --border-mid:#D4CCC4;
  --text:#2C2420;
  --text-2:#756E68;
  --text-3:#B0A89F;
  --accent:#e39547;
  --accent-light:#FAF0F0;
  --accent-mid:#A85E5F;
  --accent-text:#7A3A3B;
  --sage:#7A9E8A;
  --sage-light:#EFF5F1;
  --sage-text:#3A6B50;
  --stone:#8C8480;
  --stone-light:#F2EFEC;
  --mauve:#9E7FA0;
  --mauve-light:#F5EFF6;
  --mauve-text:#6B4E6E;
  --gold:#B89860;
  --gold-light:#FBF5E8;
  --gold-text:#7A6030;
  --warn-bg:#FBF5E8;
  --warn-text:#8A6830;
  --radius:10px;
  --radius-lg:16px;
  --radius-xl:20px;
  --font:'Noto Sans JP',sans-serif;
  --font-mono:'DM Mono',monospace;
  --shadow:0 1px 3px rgba(40,25,20,0.06),0 2px 8px rgba(40,25,20,0.04);
  --shadow-md:0 4px 16px rgba(40,25,20,0.09);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;line-height:1.6;min-height:100vh}

.app-header{
  background:#ffffff;
  border-bottom:1px solid var(--border);
  padding:0 32px;
  height:58px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.header-brand{display:flex;align-items:center;gap:12px}
.brand-mark{
  width:36px;height:36px;
  border-radius:8px;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.brand-mark img{width:36px;height:36px;object-fit:cover;border-radius:8px;}
.brand-mark svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}
.brand-name{font-size:15px;font-weight:600;letter-spacing:0.04em;color:var(--text)}
.client-chip{
  font-size:11px;padding:3px 12px;
  border-radius:20px;
  background:var(--accent-light);
  color:var(--accent-text);
  font-weight:500;
  border:1px solid rgba(196,121,122,0.2);
  letter-spacing:0.04em;
}
.header-meta{font-size:11px;color:var(--text-3);font-family:var(--font-mono);letter-spacing:0.03em}

.nav-bar{
  background:#eaaa60;
  border-bottom:1px solid rgba(0,0,0,0.08);
  padding:0 32px;
  display:flex;gap:0;
}
.nav-tab{
  padding:14px 20px;
  font-size:12px;
  font-weight:500;
  letter-spacing:0.05em;
  color:rgba(255,255,255,0.7);
  border:none;background:none;cursor:pointer;
  border-bottom:3px solid transparent;
  margin-bottom:-1px;
  display:flex;align-items:center;gap:7px;
  transition:color 0.15s;
  white-space:nowrap;
}
.nav-tab:hover{color:#fff}
.nav-tab.active{color:#fff;border-bottom-color:#fff}
.nav-tab svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.main{padding:24px 32px;max-width:1100px}
.section{display:none}
.section.active{display:block}

.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
select{
  font-family:var(--font);font-size:12px;
  padding:7px 14px;
  border:1px solid var(--border);
  border-radius:var(--radius);
  background:var(--surface);
  color:var(--text);cursor:pointer;outline:none;
  min-width:120px;
  box-shadow:var(--shadow);
  letter-spacing:0.02em;
}
select:focus{border-color:var(--accent)}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--font);font-size:12px;letter-spacing:0.03em;
  padding:7px 16px;
  border:1px solid var(--border);
  border-radius:var(--radius);
  background:var(--surface);
  color:var(--text-2);cursor:pointer;white-space:nowrap;
  transition:all 0.15s;
  box-shadow:var(--shadow);
}
.btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.btn-ml{margin-left:auto}

.toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.tgl{
  font-family:var(--font);font-size:12px;letter-spacing:0.03em;
  padding:6px 16px;border:none;
  background:var(--surface);color:var(--text-3);
  cursor:pointer;display:flex;align-items:center;gap:5px;
  transition:all 0.15s;
}
.tgl+.tgl{border-left:1px solid var(--border)}
.tgl.active{background:#fcf5de;color:var(--accent);font-weight:500}
.tgl svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px;gap:14px;color:var(--text-3)}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:56px;color:var(--text-3)}
.empty-state svg{width:32px;height:32px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;margin-bottom:12px;display:block;margin-inline:auto;opacity:0.5}

.timeline{padding-left:28px;border-left:1.5px solid var(--border);margin-left:6px}
.tl-item{position:relative;margin-bottom:20px;animation:fadeIn 0.22s ease both}
.tl-item::before{
  content:'';position:absolute;
  left:-32px;top:10px;
  width:10px;height:10px;border-radius:50%;
  background:var(--surface);border:2px solid #eaaa60;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.tl-meta{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.date-mono{font-family:var(--font-mono);font-size:11px;color:var(--text-3);letter-spacing:0.05em}
.dept-tag{
  font-size:10px;padding:2px 9px;border-radius:20px;
  background:var(--sage-light);color:var(--sage-text);
  font-weight:500;letter-spacing:0.04em;
}
.person-chip{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--text)}
.avatar{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:600;flex-shrink:0;
  font-family:var(--font-mono);
}
.weather-pill{
  font-size:11px;padding:2px 10px;border-radius:20px;
  background:var(--warn-bg);color:var(--warn-text);
  font-weight:500;letter-spacing:0.02em;
}
.tl-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:16px 18px;
  box-shadow:var(--shadow);
}
.report-label{
  font-size:10px;font-weight:600;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--accent);
  margin-bottom:6px;
}
.tl-report{font-size:13px;line-height:1.85;color:var(--text)}
.tl-issue{
  margin-top:10px;padding:9px 14px;
  border-left:3px solid #e39547;
  background:#fcf5de;
  border-radius:0 var(--radius) var(--radius) 0;
  font-size:12px;color:#604c3f;line-height:1.7;
}

.person-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:16px}
.person-col{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;
  box-shadow:var(--shadow);
}
.pc-head{
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  background:var(--stone-light);
}
.pc-name{font-size:13px;font-weight:600;color:var(--text)}
.pc-dept{font-size:11px;color:var(--text-3);letter-spacing:0.03em}
.pc-entries{padding:12px 18px}
.pc-entry{padding:12px 0;border-bottom:1px solid var(--border)}
.pc-entry:last-child{border-bottom:none;padding-bottom:0}
.pc-date{font-family:var(--font-mono);font-size:11px;color:var(--text-3);margin-bottom:6px;display:flex;align-items:center;gap:7px;letter-spacing:0.04em}
.pc-text{font-size:12px;line-height:1.85;color:var(--text)}
.pc-issue-bar{
  margin-top:7px;padding:7px 12px;
  border-radius:var(--radius);
  background:var(--mauve-light);
  border-left:2px solid var(--mauve);
  font-size:11px;color:var(--mauve-text);line-height:1.7;
}

.weekly-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;
  box-shadow:var(--shadow);
}

.wc-person{font-size:14px;font-weight:600;letter-spacing:0.02em}
.wc-period{font-size:11px;color:var(--text-3);font-family:var(--font-mono);letter-spacing:0.04em}
.wc-weather{margin-left:auto;font-size:12px;font-weight:500;padding:3px 12px;border-radius:20px;background:var(--warn-bg);color:var(--warn-text)}
.wc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.field-label{
  font-size:10px;font-weight:600;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--accent);
  margin-bottom:6px;
}
.field-text{font-size:12px;line-height:1.85;color:var(--text)}
.wc-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.wc-field-status{
  background:var(--sage-light);
  border:1px solid rgba(122,158,138,0.2);
  border-radius:var(--radius);
  padding:14px 16px;
}
.wc-field-status .field-label{color:var(--sage-text)}
.wc-field-issue{
  background:var(--mauve-light);
  border:1px solid rgba(158,127,160,0.2);
  border-radius:var(--radius);
  padding:14px 16px;
}
.wc-field-issue .field-label{color:var(--mauve-text)}
.wc-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}

.change-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;
  box-shadow:var(--shadow);
}
.score-row{display:flex;gap:12px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.score-box{
  flex:1;padding:14px;border-radius:var(--radius);
  display:flex;flex-direction:column;align-items:center;
}
.score-box.growth{background:var(--sage-light);color:var(--sage-text)}
.score-box.risk{background:var(--accent-light);color:var(--accent-text)}
.score-box.engage{background:var(--mauve-light);color:var(--mauve-text)}
.score-label{font-size:10px;font-weight:600;letter-spacing:0.07em;margin-bottom:5px}
.score-val{font-size:26px;font-weight:600;font-family:var(--font-mono)}

.award-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;
  box-shadow:var(--shadow);
}
.award-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.award-dept{font-size:14px;font-weight:600;letter-spacing:0.02em}
.award-period{font-size:11px;color:var(--text-3);font-family:var(--font-mono);letter-spacing:0.04em}
.award-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.award-item{
  padding:14px;border-radius:var(--radius);
  background:var(--gold-light);
  border:1px solid rgba(184,152,96,0.18);
}
.award-type{font-size:10px;font-weight:600;letter-spacing:0.07em;color:var(--gold);margin-bottom:5px}
.award-winner{font-size:13px;font-weight:600;margin-bottom:5px;color:var(--gold-text)}
.award-reason{font-size:11px;color:var(--text-2);line-height:1.75}

.av-0{background:#fffffb;color:#7A3A3B}
.av-1{background:#fffffb;color:#3A6B50}
.av-2{background:#fffffb;color:#6B4E6E}
.av-3{background:#fffffb;color:#7A6030}
.av-4{background:#fffffb;color:#5A4840}
.av-5{background:#fffffb;color:#3A506B}

.fmt-h1{display:block;font-size:14px;font-weight:700;color:var(--text);margin:10px 0 4px;letter-spacing:0.02em}
.fmt-h2{display:block;font-size:13px;font-weight:600;color:var(--accent);margin:8px 0 3px;letter-spacing:0.02em}
.fmt-h3{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin:6px 0 2px}
.fmt-li{
  display:flex;gap:6px;align-items:baseline;
  padding:3px 0;font-size:12px;line-height:1.7;
}
.fmt-li::before{
  content:'';display:inline-block;
  width:5px;height:5px;border-radius:50%;
  background:var(--accent);flex-shrink:0;margin-top:6px;
}
.fmt-num{
  font-size:11px;font-weight:600;
  color:var(--accent);min-width:16px;flex-shrink:0;
}
.fmt-li:has(.fmt-num)::before{display:none}
.fmt-gap{height:8px}
.fmt-hr{border:none;border-top:1px solid var(--border);margin:8px 0}

/* ===== 部署チェックボックス ===== */
.dept-checkbox-wrap{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-bottom:8px;min-height:32px;
  padding:8px;
  border:1px solid var(--border);
  border-radius:var(--radius);
  background:var(--surface);
}
.dept-cb-label{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;
  border:1px solid var(--border);
  border-radius:20px;
  font-size:11px;cursor:pointer;
  background:var(--surface);
  transition:all 0.15s;
  user-select:none;
}
.dept-cb-label:hover{background:var(--accent-light);border-color:var(--accent)}
.dept-cb-label input[type=checkbox]{accent-color:var(--accent);cursor:pointer}
.dept-cb-label.checked{
  background:var(--accent-light);
  border-color:var(--accent);
  color:var(--accent-text);
  font-weight:500;
}
.dept-selected-display{
  font-size:11px;color:var(--text-3);
  margin-top:4px;margin-bottom:8px;
  min-height:16px;
}
.special-dept-row{display:flex;gap:6px;margin-top:6px}
.trend-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:12px}
.trend-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.trend-name{font-weight:600;font-size:13px}
.trend-dept{font-size:11px;color:var(--text-3)}
.trend-chart-wrap{position:relative;height:220px}
.trend-scores{display:flex;gap:6px;align-items:center;margin-left:auto;flex-wrap:wrap}
.trend-score-badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;font-family:var(--font-mono);letter-spacing:0.02em;white-space:nowrap}
.ts-g{background:var(--sage-light);color:var(--sage-text)}
.ts-r{background:var(--accent-light);color:var(--accent-text)}
.ts-e{background:var(--mauve-light);color:var(--mauve-text)}
.ts-cmp{font-size:9px;font-weight:400;opacity:0.75;margin-left:4px;letter-spacing:0}
.trend-months{font-size:11px;color:var(--text-3);font-family:var(--font-mono);letter-spacing:0.04em;padding:3px 10px;border-radius:20px;background:var(--stone-light)}
.prev-year-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--stone-light);border-radius:var(--radius);margin-bottom:16px;flex-wrap:wrap}
.prev-year-label{font-size:11px;color:var(--text-2);font-weight:500;margin-right:4px;white-space:nowrap}
</style>
</head>

<script>
// ===== GASテンプレート変数 =====
const CLIENT_ID = 'personal';
const CLIENT_NAME = '<?= clientName ?>';
window.__isMaster = <?= isMaster ?>;

// ===== 状態管理 =====
const state = {
  daily   : null,
  weekly  : null,
  change  : null,
  award   : null,
  view    : 'timeline',
  loaded  : { daily:false, weekly:false, change:false, award:false }
};

// ===== 初期化 =====
document.getElementById('client-label').textContent = CLIENT_NAME;
document.getElementById('last-updated').textContent =
  new Date().toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) + ' 更新';

// ===== 全データ一括ロード =====
function loadAllData() {
  ['daily','weekly','change','trend','award'].forEach(id => {
    const el = document.getElementById(id + '-content');
    if (el) el.innerHTML = '<div class="loading"><div class="spinner"></div><span>読み込み中...</span></div>';
  });
  google.script.run
    .withSuccessHandler(function(all) {
      state.daily  = all.daily;
      state.weekly = {
        ...all.weekly,
        entries: all.weekly.entries.filter(e => !isInvalidWeeklyPeriod(e.period)),
        periods: all.weekly.periods.filter(p => !isInvalidWeeklyPeriod(p))
      };
      state.change = all.change;
      state.award  = all.award;
      state.loaded = { daily:true, weekly:true, change:true, award:true };

      updateSelect('d-dept',   all.daily.depts,   '全部署');
      updateSelect('d-person', all.daily.persons, '全担当者');
      updateSelect('w-dept',   state.weekly.depts,   '全部署');
      updateSelect('w-period', state.weekly.periods, '全期間');
      updateSelect('c-person', all.change.persons, '全担当者');
      updateSelect('t-person', all.change.persons, '全担当者');
      updateSelect('a-dept',   all.award.depts,   '全部署');

      document.getElementById('last-updated').textContent =
        new Date().toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) + ' 更新';

      renderDaily();

      window.__visibleTabs = window.__isMaster
        ? ['daily','weekly','change','trend','award','access']
        : ['daily','weekly','change','trend','award'];
    })
    .withFailureHandler(function(err) {
      ['daily','weekly','change','award'].forEach(id => showError(id + '-content', err));
    })
    .getAllData();
}

loadAllData();

// ===== タブ切り替え =====
function switchTab(id) {
  const tabIds = window.__visibleTabs || ['daily','weekly','change','award'];
  document.querySelectorAll('.nav-tab').forEach((t,i)=>{
    t.classList.toggle('active', tabIds[i] === id);
  });
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  const sec = document.getElementById('sec-'+id);
  if (!sec) return;
  sec.classList.add('active');

  if (id === 'daily')  renderDaily();
  if (id === 'weekly') renderWeekly();
  if (id === 'change') renderChange();
  if (id === 'trend')  renderTrend();
  if (id === 'award')  renderAward();
  if (id === 'access') loadAccessList();
}

// ===== ビュー切り替え =====
function setView(v) {
  state.view = v;
  document.querySelectorAll('#view-toggle .tgl').forEach((b,i)=>{
    b.classList.toggle('active', ['timeline','person'][i] === v);
  });
  if (state.daily) renderDaily();
}

// ===== アバターカラー =====
const _avCache = {};
function avClass(name) {
  if (_avCache[name] !== undefined) return _avCache[name];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xFFFF;
  return (_avCache[name] = 'av-' + (h % 6));
}
function initials(name) {
  const n = name.trim();
  if (/[a-zA-Z]/.test(n)) {
    const p = n.split(' ');
    return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase();
  }
  return n.slice(0, 2);
}
function avatarHtml(name, size) {
  size = size || 26;
  return `<div class="avatar ${avClass(name)}" style="width:${size}px;height:${size}px;font-size:${Math.floor(size*0.4)}px">${initials(name)}</div>`;
}

// ===== プルダウン更新 =====
function updateSelect(id, items, allLabel) {
  const el = document.getElementById(id);
  const cur = el.value;
  el.innerHTML = `<option value="all">${allLabel}</option>` +
    items.map(v => `<option value="${esc(v)}"${v===cur?' selected':''}>${esc(v)}</option>`).join('');
}

function filteredDaily() {
  if (!state.daily) return [];
  const dept   = document.getElementById('d-dept').value;
  const person = document.getElementById('d-person').value;
  return state.daily.entries.filter(d =>
    (dept   === 'all' || d.dept   === dept) &&
    (person === 'all' || d.person === person)
  );
}

function applyDailyFilters() { renderDaily(); }

function renderDaily() {
  const data = filteredDaily();
  const el   = document.getElementById('daily-content');
  if (!data.length) { el.innerHTML = emptyHtml('日報データがありません'); return; }

  if (state.view === 'timeline') {
    el.innerHTML = '<div class="timeline">' +
      data.map((d,i) => `
        <div class="tl-item" style="animation-delay:${i*30}ms">
          <div class="tl-meta">
            <span class="date-mono">${d.date}</span>
            <span class="dept-tag">${esc(d.dept)}</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
            ${avatarHtml(d.person, 22)}
            <span class="person-chip">${esc(d.person)}</span>
            <span class="weather-pill">${esc(stripZatsudan(d.weather))}</span>
          </div>
          <div class="tl-card">
            <div class="report-label">今日の報告</div>
            <div class="tl-report">${formatText(stripZatsudan(d.report))}</div>
            ${d.issue ? `<div class="tl-issue" style="max-height:160px;overflow-y:auto">${formatText(d.issue)}</div>` : ''}
          </div>
        </div>
      `).join('') + '</div>';
  } else {
    const persons = [...new Set(data.map(d => d.person))];
    el.innerHTML = '<div class="person-grid">' +
      persons.map(p => {
        const entries = data.filter(d => d.person === p);
        const dept = entries[0].dept;
        return `<div class="person-col">
          <div class="pc-head">
            ${avatarHtml(p, 28)}
            <div>
              <div class="pc-name">${esc(p)}</div>
              <div class="pc-dept">${esc(dept)}</div>
            </div>
          </div>
          <div class="pc-entries">
            ${entries.map(e => `
              <div class="pc-entry">
                <div class="pc-date">
                  <span>${e.date}</span>
                  <span class="weather-pill" style="font-size:10px">${esc(stripZatsudan(e.weather))}</span>
                </div>
                <div class="field-label" style="margin-bottom:3px;font-size:10px;color:var(--accent)">今日の報告</div>
                <div class="pc-text">${formatText(stripZatsudan(e.report))}</div>
                ${e.issue ? `<div class="pc-issue-bar">${formatText(e.issue)}</div>` : ''}
              </div>
            `).join('')}
          </div>
        </div>`;
      }).join('') + '</div>';
  }
}

function applyWeeklyFilters() { renderWeekly(); }

function renderWeekly() {
  const dept   = document.getElementById('w-dept').value;
  const period = document.getElementById('w-period').value;
  const data   = state.weekly ? state.weekly.entries.filter(e =>
    (dept   === 'all' || e.dept   === dept) &&
    (period === 'all' || e.period === period) &&
    e.rowType === 'person' &&
    !isInvalidWeeklyPeriod(e.period)
  ) : [];
  const el = document.getElementById('weekly-content');
  if (!data.length) { el.innerHTML = emptyHtml('週次データがありません'); return; }

  el.innerHTML = data.map(d => `
    <div class="weekly-card">
      <div class="wc-head">
        ${avatarHtml(d.person, 30)}
        <div>
          <div class="wc-person"><span style="font-size:11px;color:var(--text-3);margin-right:7px">${esc(d.dept)}</span>${esc(d.person)}</div>
          <div class="wc-period">${esc(formatWeeklyPeriod(d.period))}</div>
        </div>
      </div>
      <div class="wc-grid" style="grid-template-columns:1fr 1fr 1fr">
        <div class="wc-field-status">
          <div class="field-label">現状</div>
          <div class="field-text" style="max-height:200px;overflow-y:auto">${formatText(d.status)}</div>
        </div>
        <div class="wc-field-issue">
          <div class="field-label" style="color:var(--mauve)">課題</div>
          <div class="field-text" style="max-height:200px;overflow-y:auto">${formatText(d.issue)}</div>
        </div>
        <div style="background:var(--gold-light);border:1px solid rgba(184,152,96,0.18);border-radius:var(--radius);padding:14px 16px">
          <div class="field-label" style="color:var(--gold-text)">注目のポイント</div>
          <div class="field-text" style="max-height:200px;overflow-y:auto">${formatText(d.spotlight)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function applyChangeFilters() { renderChange(); }

function renderChange() {
  const person = document.getElementById('c-person').value;
  const data   = state.change ? state.change.entries.filter(e =>
    person === 'all' || e.person === person
  ) : [];
  const el = document.getElementById('change-content');
  if (!data.length) {
    el.innerHTML = emptyHtml('変化点データがありません<br><small>月次処理後に表示されます</small>');
    return;
  }
  el.innerHTML = data.map(d => `
    <div class="change-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        ${avatarHtml(d.person, 28)}
        <div style="flex:1">
          <div style="font-weight:600;font-size:13px">${esc(d.person)}</div>
          <div style="display:inline-block;margin-top:4px;padding:3px 10px;border-radius:20px;background:var(--stone-light);border:1px solid var(--border);font-size:11px;color:var(--text-2);font-family:var(--font-mono)">${esc(d.inputCount)}</div>
        </div>
        <div style="display:flex;gap:8px">
          <div style="text-align:center;padding:6px 14px;border-radius:var(--radius);background:var(--sage-light);color:var(--sage-text)">
            <div style="font-size:10px;font-weight:600;letter-spacing:0.05em;margin-bottom:2px">成長</div>
            <div style="font-size:20px;font-weight:600;font-family:var(--font-mono)">${d.scoreGrowth}</div>
          </div>
          <div style="text-align:center;padding:6px 14px;border-radius:var(--radius);background:var(--accent-light);color:var(--accent-text)">
            <div style="font-size:10px;font-weight:600;letter-spacing:0.05em;margin-bottom:2px">リスク</div>
            <div style="font-size:20px;font-weight:600;font-family:var(--font-mono)">${d.scoreRisk}</div>
          </div>
          <div style="text-align:center;padding:6px 14px;border-radius:var(--radius);background:var(--mauve-light);color:var(--mauve-text)">
            <div style="font-size:10px;font-weight:600;letter-spacing:0.05em;margin-bottom:2px">エンゲージ</div>
            <div style="font-size:20px;font-weight:600;font-family:var(--font-mono)">${d.scoreEngage}</div>
          </div>
        </div>
      </div>
      <div class="wc-grid">
        <div class="wc-field-status"><div class="field-label">成長点</div><div class="field-text" style="max-height:150px;overflow-y:auto">${formatText(d.growth)}</div></div>
        <div class="wc-field-issue"><div class="field-label" style="color:var(--mauve-text)">変化点</div><div class="field-text" style="max-height:150px;overflow-y:auto">${formatText(d.change)}</div></div>
      </div>
      <div class="wc-grid" style="margin-top:10px">
        <div style="background:var(--stone-light);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px">
          <div class="field-label" style="color:var(--stone)">問題点</div>
          <div class="field-text" style="max-height:150px;overflow-y:auto">${formatText(d.problem)}</div>
        </div>
        <div style="background:var(--warn-bg);border:1px solid rgba(184,152,96,0.2);border-radius:var(--radius);padding:12px 14px">
          <div class="field-label" style="color:var(--warn-text)">感情状態</div>
          <div class="field-text" style="max-height:150px;overflow-y:auto">${formatText(d.emotion)}</div>
        </div>
      </div>
      <div class="wc-grid" style="margin-top:10px">
        <div style="background:var(--teal-light,#E3F4F7);border:1px solid rgba(70,160,180,0.2);border-radius:var(--radius);padding:12px 14px">
          <div class="field-label" style="color:var(--teal-text,#1A5F6E)">エンゲージメント</div>
          <div class="field-text" style="max-height:150px;overflow-y:auto">${formatText(d.engagement)}</div>
        </div>
        <div style="background:var(--accent-light);border:1px solid rgba(196,121,122,0.2);border-radius:var(--radius);padding:12px 14px">
          <div class="field-label" style="color:var(--accent-text)">リスク兆候</div>
          <div class="field-text" style="max-height:150px;overflow-y:auto">${formatText(d.riskSign)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function applyAwardFilters() { renderAward(); }

function renderAward() {
  const dept = document.getElementById('a-dept').value;
  const entries = state.award ? state.award.entries.filter(e =>
    (dept === 'all' || e.dept === dept) && e.period
  ) : [];
  const el = document.getElementById('award-content');
  if (!entries.length) { el.innerHTML = emptyHtml('アワードデータがありません'); return; }

  const groups = {};
  entries.forEach(e => {
    const key = e.period + '|' + e.dept;
    if (!groups[key]) groups[key] = { dept:e.dept, period:e.period, items:[] };
    const TYPES = ['グッドアイデア賞','つぶやきマスター賞','気付き賞','ポジティブ賞'];
    const COLS  = ['award1','award2','award3','award4'];
    TYPES.forEach((t,i) => {
      if (e[COLS[i]]) groups[key].items.push({ type:t, text:e[COLS[i]], person:e.person });
    });
  });

  el.innerHTML = Object.values(groups).map(g => `
    <div class="award-card">
      <div class="award-head">
        <svg style="width:16px;height:16px;stroke:#BA7517;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 16 16"><path d="M8 2l1.5 3 3.5.5-2.5 2.5.5 3.5L8 10l-3 1.5.5-3.5L3 5.5 6.5 5z"/></svg>
        <span class="award-dept">${esc(g.dept)}</span>
        <span class="award-period">${esc(g.period)}</span>
      </div>
      <div class="award-grid">
        ${g.items.map(item => `
          <div class="award-item">
            <div class="award-type">${esc(item.type)}</div>
            <div class="award-winner">${esc(item.person)}</div>
            <div class="award-reason">${esc(item.text)}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ===== 推移グラフ =====
function normalizeMon(s) {
  const str = String(s || '').trim();
  if (!str) return '';
  if (/\d{4}年\d{1,2}月/.test(str)) return str;
  const d = new Date(str);
  if (!isNaN(d.getTime())) return d.getFullYear() + '年' + (d.getMonth() + 1) + '月';
  return str;
}

function parseMon(s) {
  const m = normalizeMon(s).match(/(\d{4})年(\d{1,2})月/);
  return m ? parseInt(m[1]) * 100 + parseInt(m[2]) : 0;
}

function renderTrend() {
  const el = document.getElementById('trend-content');
  if (!state.change) { el.innerHTML = emptyHtml('データを読み込んでいます...'); return; }

  const personFilter = document.getElementById('t-person').value;
  const allEntries   = state.change.entries;

  const allMonths = [...new Set(allEntries.map(e => normalizeMon(e.currentMonth)))]
    .filter(Boolean)
    .sort((a, b) => parseMon(a) - parseMon(b));

  if (!allMonths.length) { el.innerHTML = emptyHtml('変化点データがありません'); return; }

  // 年セレクトを構築・選択年を取得
  const allYears = [...new Set(allMonths.map(m => Math.floor(parseMon(m) / 100)))].sort((a,b) => b - a);
  const yearEl   = document.getElementById('t-year');
  const savedYear = yearEl ? parseInt(yearEl.value) : null;
  if (yearEl) {
    yearEl.innerHTML = allYears.map(y => `<option value="${y}">${y}年</option>`).join('');
    if (savedYear && allYears.includes(savedYear)) yearEl.value = savedYear;
  }

  const currentYear = parseInt(yearEl?.value) || allYears[0];
  const prevYear    = currentYear - 1;
  const curEntries  = allEntries.filter(e => Math.floor(parseMon(normalizeMon(e.currentMonth)) / 100) === currentYear);
  const prevEntries = allEntries.filter(e => Math.floor(parseMon(normalizeMon(e.currentMonth)) / 100) === prevYear);

  const chartMonths = [];
  for (let mo = 1; mo <= 12; mo++) chartMonths.push(currentYear + '年' + mo + '月');

  const curYearMonths = allMonths.filter(m => Math.floor(parseMon(m) / 100) === currentYear);

  const byPerson = {};
  allEntries.forEach(e => {
    if (!e.person) return;
    if (!byPerson[e.person]) byPerson[e.person] = {};
    byPerson[e.person][normalizeMon(e.currentMonth)] = e;
  });

  let persons = Object.keys(byPerson);
  if (personFilter !== 'all') persons = persons.filter(p => p === personFilter);
  if (!persons.length) { el.innerHTML = emptyHtml('担当者データがありません'); return; }

  const grandAvg = key => {
    const vals = curEntries.map(e => Number(e[key]) || 0).filter(v => v > 0);
    return vals.length ? vals.reduce((s,v) => s+v, 0) / vals.length : null;
  };
  const grandG = grandAvg('scoreGrowth');
  const grandR = grandAvg('scoreRisk');
  const grandE = grandAvg('scoreEngage');
  const cmpStr = (avg, grand) => {
    if (avg === null || grand === null) return '';
    const d = (parseFloat(avg) - grand).toFixed(1);
    return `<span class="ts-cmp">AVE ${d >= 0 ? '+' : ''}${d}</span>`;
  };

  const prevAvgFn = key => {
    const vals = prevEntries.map(e => Number(e[key]) || 0).filter(v => v > 0);
    return vals.length ? (vals.reduce((s,v) => s+v, 0) / vals.length).toFixed(1) : null;
  };
  const prevYearHtml = prevEntries.length ? `
    <div class="prev-year-bar">
      <span class="prev-year-label">${prevYear}年 全体平均</span>
      ${prevAvgFn('scoreGrowth') !== null ? `<span class="trend-score-badge ts-g" style="opacity:0.6">成長 ${prevAvgFn('scoreGrowth')}</span>` : ''}
      ${prevAvgFn('scoreRisk')   !== null ? `<span class="trend-score-badge ts-r" style="opacity:0.6">リスク ${prevAvgFn('scoreRisk')}</span>` : ''}
      ${prevAvgFn('scoreEngage') !== null ? `<span class="trend-score-badge ts-e" style="opacity:0.6">エンゲ ${prevAvgFn('scoreEngage')}</span>` : ''}
    </div>` : '';

  if (window._trendCharts) window._trendCharts.forEach(c => c.destroy());
  window._trendCharts = [];

  el.innerHTML = prevYearHtml + persons.map((p, idx) => {
    const name    = p.includes('｜') ? p.split('｜')[1].trim() : p;
    const dept    = p.includes('｜') ? p.split('｜')[0].trim() : '';
    const cid     = 'chart_' + idx;
    const pd      = byPerson[p];
    const pMonths = curYearMonths.filter(m => pd[m]);
    const cnt     = pMonths.length;
    const scAvg   = key => {
      if (!pMonths.length) return null;
      const vals = pMonths.map(m => Number(pd[m][key]) || 0);
      return (vals.reduce((s,v) => s+v, 0) / vals.length).toFixed(1);
    };
    const avgG = scAvg('scoreGrowth');
    const avgR = scAvg('scoreRisk');
    const avgE = scAvg('scoreEngage');
    return `
      <div class="trend-card">
        <div class="trend-head">
          ${avatarHtml(name, 28)}
          <div>
            <div class="trend-name">${esc(name)}</div>
            ${dept ? `<div class="trend-dept">${esc(dept)}</div>` : ''}
          </div>
          <div class="trend-scores">
            ${avgG !== null ? `<span class="trend-score-badge ts-g">成長 ${avgG}${cmpStr(avgG, grandG)}</span>` : ''}
            ${avgR !== null ? `<span class="trend-score-badge ts-r">リスク ${avgR}${cmpStr(avgR, grandR)}</span>` : ''}
            ${avgE !== null ? `<span class="trend-score-badge ts-e">エンゲ ${avgE}${cmpStr(avgE, grandE)}</span>` : ''}
            <span class="trend-months">${cnt}か月分</span>
          </div>
        </div>
        <div class="trend-chart-wrap"><canvas id="${cid}"></canvas></div>
      </div>
    `;
  }).join('');

  persons.forEach((p, idx) => {
    const cid    = 'chart_' + idx;
    const canvas = document.getElementById(cid);
    if (!canvas) return;

    const pd = byPerson[p];
    const gRaw   = chartMonths.map(m => pd[m] ? (pd[m].scoreGrowth  || null) : null);
    const rRaw   = chartMonths.map(m => pd[m] ? (pd[m].scoreRisk    || null) : null);
    const eRaw   = chartMonths.map(m => pd[m] ? (pd[m].scoreEngage  || null) : null);
    const J = 0.12;
    const gData  = gRaw.map(v => v !== null ? Math.min(5, v + J) : null);
    const rData  = rRaw.slice();
    const eData  = eRaw.map(v => v !== null ? Math.max(0, v - J) : null);

    const chart = new Chart(canvas, {
      type: 'line',
      data: {
        labels: chartMonths,
        datasets: [
          { label:'成長スコア',       data:gData, borderColor:'#7A9E8A', pointBackgroundColor:'#7A9E8A', pointRadius:6, pointHoverRadius:8, borderWidth:2.5, tension:0.3, fill:false, spanGaps:false },
          { label:'リスクスコア',     data:rData, borderColor:'#C47A7A', pointBackgroundColor:'#C47A7A', pointRadius:6, pointHoverRadius:8, borderWidth:2.5, tension:0.3, fill:false, spanGaps:false },
          { label:'エンゲージスコア', data:eData, borderColor:'#9E7FA0', pointBackgroundColor:'#9E7FA0', pointRadius:6, pointHoverRadius:8, borderWidth:2.5, tension:0.3, fill:false, spanGaps:false },
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          y: { min:0, max:5, ticks:{ stepSize:1, font:{size:11}, color:'#B0A89F' }, grid:{ color:'rgba(0,0,0,0.05)' } },
          x: { ticks:{ font:{size:11}, color:'#756E68' }, grid:{ color:'rgba(0,0,0,0.04)' } }
        },
        plugins: {
          legend: { position:'bottom', labels:{ font:{size:10}, padding:10, boxWidth:24 } },
          tooltip: {
            callbacks: {
              label: ctx => {
                const v = [gRaw, rRaw, eRaw][ctx.datasetIndex]?.[ctx.dataIndex] ?? null;
                if (v === null || v === undefined) return null;
                return ctx.dataset.label + ': ' + v;
              }
            }
          }
        }
      }
    });
    window._trendCharts.push(chart);
  });
}

// ===== CSV ダウンロード =====
function downloadCSV(type) {
  const btns = document.querySelectorAll('.btn-ml');
  btns.forEach(b => { b.disabled = true; b.textContent = '取得中...'; });

  google.script.run
    .withSuccessHandler(function(all) {
      btns.forEach(b => {
        b.disabled = false;
        b.innerHTML = '<svg viewBox="0 0 16 16" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round"><path d=\"M8 2v8M5 7l3 3 3-3M3 12h10\"/></svg> CSV';
      });
      let rows = [];
      if (type === 'daily') {
        rows = [['部署','担当者','日付','心のお天気','今日の報告','課題']];
        all.daily.forEach(d => rows.push([d.dept,d.person,d.date,d.weather,d.report,d.issue]));
      } else if (type === 'weekly') {
        rows = [['部署','担当者','週報期間','心のお天気','現状','課題']];
        all.weekly.forEach(d => rows.push([d.dept,d.person,d.period,d.weather,d.status,d.issue]));
      } else if (type === 'change') {
        rows = [['担当者','当月','前月','入力件数','成長点','変化点','問題点','感情状態','成長スコア','リスクスコア','エンゲージスコア']];
        (state.change ? state.change.entries : []).forEach(d =>
          rows.push([d.person,d.currentMonth,d.prevMonth,d.inputCount,d.growth,d.change,d.problem,d.emotion,d.scoreGrowth,d.scoreRisk,d.scoreEngage])
        );
      } else {
        rows = [['部署','担当者','期間','グッドアイデア賞','つぶやきマスター賞','気付き賞','ポジティブ賞']];
        all.award.forEach(d => rows.push([d.dept,d.person,d.period,d.award1,d.award2,d.award3,d.award4]));
      }
      exportCSV(rows, type);
    })
    .withFailureHandler(function(err) {
      btns.forEach(b => {
        b.disabled = false;
        b.innerHTML = '<svg viewBox="0 0 16 16" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round"><path d=\"M8 2v8M5 7l3 3 3-3M3 12h10\"/></svg> CSV';
      });
      alert('取得に失敗しました: ' + (err.message || err));
    })
    .getAllDataForExport();
}

function exportCSV(rows, type) {
  const bom = '\uFEFF';
  const csv = bom + rows.map(r => r.map(c => '"' + String(c||'').replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'voicelog_' + CLIENT_NAME + '_' + type + '.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ===== 権限管理（MASTERのみ）=====
function loadAccessList() {
  const el = document.getElementById('access-content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><span>読み込み中...</span></div>';

  // 部署チェックボックスをまだ読み込んでいなければ読み込む
  if (_deptList.length === 0) loadDeptCheckboxes();

  google.script.run
    .withSuccessHandler(function(list) {
      if (!list.length) { el.innerHTML = emptyHtml('登録されている権限がありません'); return; }
      el.innerHTML = '<div class="weekly-card">' +
        '<table style="width:100%;border-collapse:collapse;font-size:12px">' +
        '<thead><tr style="border-bottom:1px solid var(--border)">' +
        '<th style="text-align:left;padding:8px 6px;color:var(--text-3);font-weight:600;font-size:11px">氏名</th>' +
        '<th style="text-align:left;padding:8px 6px;color:var(--text-3);font-weight:600;font-size:11px">メールアドレス</th>' +
        '<th style="text-align:left;padding:8px 6px;color:var(--text-3);font-weight:600;font-size:11px">担当部署</th>' +
        '<th style="width:60px"></th></tr></thead><tbody>' +
        list.map(function(item) {
          const deptTags = (item.dept || 'ALL').split(',').map(d => d.trim()).filter(Boolean)
            .map(d => '<span class="dept-tag" style="margin-right:4px">' + esc(d) + '</span>').join('');
          return '<tr style="border-bottom:1px solid var(--border)">' +
            '<td style="padding:8px 6px;font-weight:500">' + (esc(item.name) || '<span style="color:var(--text-3)">（未設定）</span>') + '</td>' +
            '<td style="padding:8px 6px;color:var(--text-2)">' + esc(item.email) + '</td>' +
            '<td style="padding:8px 6px">' + (deptTags || '<span class="dept-tag">ALL</span>') + '</td>' +
            '<td style="padding:8px 6px"><button class="btn" style="padding:4px 10px;font-size:11px" onclick="doRemoveAccess(\'' + item.email + '\')">削除</button></td>' +
            '</tr>';
        }).join('') +
        '</tbody></table></div>';
    })
    .withFailureHandler(function(err) { showError('access-content', err); })
    .getDashboardAccessList();
}

function doAddAccess() {
  const name  = document.getElementById('ac-name').value.trim();
  const email = document.getElementById('ac-email').value.trim();
  const dept  = document.getElementById('ac-dept').value.trim();
  if (!email) { alert('メールアドレスは必須です'); return; }
  if (!dept)  { alert('担当部署を選択してください'); return; }
  const btn = document.getElementById('ac-add-btn');
  btn.disabled = true; btn.textContent = '保存中...';
  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false; btn.textContent = '追加・更新する';
      if (res.success) {
        document.getElementById('ac-name').value  = '';
        document.getElementById('ac-email').value = '';
        resetDeptCheckboxes();
        loadAccessList();
      } else {
        alert('エラー: ' + res.error);
      }
    })
    .withFailureHandler(function(err) {
      btn.disabled = false; btn.textContent = '追加・更新する';
      alert('エラー: ' + (err.message || err));
    })
    .addDashboardAccess(email, name, dept);
}

function doRemoveAccess(email) {
  if (!confirm(email + ' の権限を削除しますか？')) return;
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.success) loadAccessList();
      else alert('エラー: ' + res.error);
    })
    .withFailureHandler(function(err) { alert('エラー: ' + (err.message || err)); })
    .removeDashboardAccess(email);
}

// ===== 部署チェックボックス =====
let _deptList = [];

function loadDeptCheckboxes() {
  google.script.run
    .withSuccessHandler(function(depts) {
      _deptList = depts;
      const container = document.getElementById('dept-checkbox-list');
      if (!depts || depts.length === 0) {
        container.innerHTML = '<span style="font-size:11px;color:var(--text-3)">部署が見つかりません</span>';
        return;
      }
      container.innerHTML = depts.map(dept => `
        <label class="dept-cb-label" id="dept-label-${esc(dept)}">
          <input type="checkbox" value="${esc(dept)}" onchange="updateDeptInput()">
          ${esc(dept)}
        </label>
      `).join('');
    })
    .withFailureHandler(function() {
      document.getElementById('dept-checkbox-list').innerHTML =
        '<span style="font-size:11px;color:red">読み込み失敗</span>';
    })
    .getDeptList();
}

function updateDeptInput() {
  const checkboxes = document.querySelectorAll('#dept-checkbox-list input[type=checkbox]');
  const selected = Array.from(checkboxes)
    .filter(cb => cb.checked)
    .map(cb => cb.value);

  // チェック済みラベルにクラスを付与してスタイル変更
  checkboxes.forEach(cb => {
    const label = cb.closest('label');
    if (label) label.classList.toggle('checked', cb.checked);
  });

  document.getElementById('ac-dept').value = selected.join(',');
  document.getElementById('ac-dept-display').textContent =
    selected.length > 0 ? selected.join('、') : '（未選択）';
}

function setSpecialDept(val) {
  // チェックボックスを全部外してALL or MASTERを設定
  const checkboxes = document.querySelectorAll('#dept-checkbox-list input[type=checkbox]');
  checkboxes.forEach(cb => {
    cb.checked = false;
    const label = cb.closest('label');
    if (label) label.classList.remove('checked');
  });
  document.getElementById('ac-dept').value = val;
  document.getElementById('ac-dept-display').textContent = val;
}

function resetDeptCheckboxes() {
  const checkboxes = document.querySelectorAll('#dept-checkbox-list input[type=checkbox]');
  checkboxes.forEach(cb => {
    cb.checked = false;
    const label = cb.closest('label');
    if (label) label.classList.remove('checked');
  });
  document.getElementById('ac-dept').value = '';
  document.getElementById('ac-dept-display').textContent = '（未選択）';
}

// ===== ユーティリティ =====
function formatText(s) {
  if (!s) return '';
  var t = String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');

  var lines2 = t.split('\n');
  var out = [];
  for (var i = 0; i < lines2.length; i++) {
    var line = lines2[i];
    if (line.trim() === '') {
      out.push('<div class="fmt-gap"></div>');
      continue;
    }
    if (line.trim().slice(0,3) === '---') {
      out.push('<hr class="fmt-hr">');
      continue;
    }
    if (line.slice(0,3) === '###') {
      out.push('<span class="fmt-h3">' + applyInline(line.replace(/^###\s*/, '')) + '</span>');
      continue;
    }
    if (line.slice(0,2) === '##') {
      out.push('<span class="fmt-h2">' + applyInline(line.replace(/^##\s*/, '')) + '</span>');
      continue;
    }
    if (line.slice(0,1) === '#' && line.slice(0,5) !== '#&amp') {
      out.push('<span class="fmt-h1">' + applyInline(line.replace(/^#\s*/, '')) + '</span>');
      continue;
    }
    var fc = line.slice(0,2);
    if (fc === '- ' || fc === '・') {
      out.push('<span class="fmt-li">' + applyInline(line.replace(/^[-・]\s*/, '')) + '</span>');
      continue;
    }
    var nums = '①②③④⑤⑥⑦⑧⑨⑩';
    if (nums.indexOf(line.slice(0,1)) >= 0) {
      out.push('<span class="fmt-li"><span class="fmt-num">' + line.slice(0,1) + '</span>' + applyInline(line.slice(1).trim()) + '</span>');
      continue;
    }
    out.push(applyInline(line) + '<br>');
  }
  return out.join('');
}

function applyInline(s) {
  var r = '';
  var rest = s;
  while (rest.length > 0) {
    var idx = rest.indexOf('**');
    if (idx < 0) { r += rest; break; }
    var end2 = rest.indexOf('**', idx + 2);
    if (end2 < 0) { r += rest; break; }
    r += rest.slice(0, idx) + '<strong>' + rest.slice(idx + 2, end2) + '</strong>';
    rest = rest.slice(end2 + 2);
  }
  return r;
}

function stripZatsudan(s) {
  if (!s) return '';
  const idx = s.indexOf('★ちょっと雑談');
  if (idx === -1) return s.trim();
  return s.slice(0, idx).trim();
}

function isInvalidWeeklyPeriod(period) {
  if (!period) return false;
  const normalized = String(period).replace(/\u3000/g, ' ').replace(/\s+/g, ' ').trim();
  const parts = normalized.split(/\s*から\s*/);
  return parts.length === 2 && parts[0].trim() === parts[1].trim();
}

function formatWeeklyPeriod(period) {
  if (!period) return '';
  const normalized = String(period).replace(/\u3000/g, ' ').replace(/\s+/g, ' ').trim();
  const parts = normalized.split(/\s*から\s*/);
  if (parts.length === 2) {
    const left = parts[0].trim();
    const right = parts[1].trim();
    if (left === right) {
      return left;
    }
  }
  return normalized;
}

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}
function emptyHtml(msg) {
  return `<div class="empty-state">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12" y2="16"/></svg>
    <p>${msg}</p>
  </div>`;
}
function showError(id, err) {
  document.getElementById(id).innerHTML = `<div class="empty-state" style="color:var(--danger-text)">${err.message||String(err)}</div>`;
}
